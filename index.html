<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>📻 Smart Radio App</title>
</head>

<body>
    <div class="radio">
        <div class="radio-card text-center">
            <select id="countrySelect" class="form-select m-3"></select>
            <select id="stationSelect" class="form-select m-3"></select>

            <div class="mt-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" id="stationLogo"
                    class="logo">
            </div>
            <audio controls src="" id="equalizer"></audio>
            <div class="fw-bold mt-2" id="stationName">Select Station</div>
            <div class="small-info" id="stationInfo"></div>

        </div>
        <script src="script.js"></script>
</body>

</html>
